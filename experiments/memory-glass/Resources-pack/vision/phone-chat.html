<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#0a0c10" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Memory Glass" />
  <meta name="application-name" content="Memory Glass" />
  <title>Memory Glass · phone</title>
  <meta name="description" content="Memory Glass phone — glass orb · live wallpaper · share photos & links" />
  <link rel="manifest" href="/manifest.webmanifest?v=icon7" />
  <!-- iOS home-screen: root path first (Safari probes /apple-touch-icon.png) -->
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" sizes="180x180" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" sizes="192x192" />
  <link rel="icon" href="/favicon.png" type="image/png" />
  <link rel="icon" href="/icons/icon-192.png" type="image/png" sizes="192x192" />
  <link rel="icon" href="/icons/icon-512.png" type="image/png" sizes="512x512" />
  <link rel="stylesheet" href="phone-mg.css?v=wave-top1" />
</head>
<body class="mg-phone">
  <!-- Full-bleed ambient: live feed + voice-orb aurora (fills top/bottom, no white bars) -->
  <div class="mg-ambient" aria-hidden="true">
    <img class="mg-ambient-live is-off" id="ambient-live" alt="" />
    <div class="mg-ambient-aurora"></div>
    <div class="mg-ambient-veil"></div>
    <div class="mg-ambient-grid"></div>
  </div>

  <div class="mg-app">
    <!-- Inspect-float style glass header -->
    <header class="mg-top" id="mg-top">
      <div class="mg-top-left">
        <img class="mark" src="/icons/icon-192.png" width="22" height="22" alt="" />
        <div class="mg-top-titles">
          <div class="ttl"><span class="dot">.</span>inspect · phone · <span class="mode" id="ph-mode">chat</span></div>
          <div class="stamp on" id="ph-host">…</div>
        </div>
      </div>
      <div class="acts">
        <button type="button" class="ghost primary" id="btn-speaker" title="Unlock phone loud speaker">🔊 Sound</button>
        <button type="button" class="ghost primary" id="btn-hold-hdr" title="Hold to talk">Talk</button>
        <button type="button" class="ghost" id="btn-cam">Cam</button>
        <button type="button" class="ghost" id="btn-fleet-hdr">Fleet</button>
      </div>
    </header>

    <!-- Waveforms in former top-notification slot -->
    <div id="mg-wave-slot"></div>

    <section class="mg-face">
      <div class="glass-orb" id="orb">
        <div class="shell"></div>
        <div class="core">
          <img src="assets/brand/grok-logomark-light.svg" alt="" draggable="false" />
        </div>
      </div>
      <div class="mg-face-meta">
        <div class="mode" id="face-mode">glass orb</div>
        <p class="status" id="status">boot…</p>
        <div class="mg-quick">
          <button type="button" class="mg-chip primary" id="btn-hold">Hold</button>
          <button type="button" class="mg-chip" id="btn-cam-quick">Cam</button>
          <button type="button" class="mg-chip" id="btn-wallpaper" title="Toggle live wallpaper">Live</button>
          <button type="button" class="mg-chip" id="btn-refresh">↻</button>
        </div>
      </div>
    </section>

    <main class="mg-panes">
      <div class="mg-peek mg-panel">
        <img id="peek" alt="" />
        <span class="lab" id="peek-lab">still-pipe · live.jpg</span>
      </div>
      <div class="mg-log mg-panel" id="log" role="log" aria-label="Snaps chat">
        <div class="empty">Snaps · chat under the window · hold to talk · share photo</div>
      </div>
    </main>

    <footer class="mg-compose">
      <div class="mg-share-preview" id="share-preview">
        <img id="share-thumb" alt="" />
        <div class="meta" id="share-meta">photo ready</div>
        <button type="button" class="x" id="share-clear" aria-label="Clear">×</button>
      </div>
      <div class="mg-compose-tools">
        <button type="button" class="mg-chip" id="btn-photo">Photo</button>
        <button type="button" class="mg-chip" id="btn-camera">Snap</button>
        <button type="button" class="mg-chip" id="btn-link">Link</button>
      </div>
      <div class="mg-compose-row">
        <textarea id="input" rows="2" maxlength="2000" placeholder="Message Mini… paste a link, or attach a photo" aria-label="Composer"></textarea>
        <button type="button" class="go" id="send">Go</button>
      </div>
      <div class="mg-compose-meta">photo · link · Enter send · Hold = talk · Live = wallpaper</div>
      <input class="mg-hidden" type="file" id="file-photo" accept="image/*" />
      <input class="mg-hidden" type="file" id="file-camera" accept="image/*" capture="environment" />
    </footer>

    <nav class="mg-nav" aria-label="Primary">
      <button type="button" class="on" id="nav-chat"><span class="ico">◎</span>Chat</button>
      <button type="button" id="nav-cam"><span class="ico">◉</span>Cam</button>
      <button type="button" id="nav-talk"><span class="ico">◌</span>Talk</button>
      <button type="button" id="nav-fleet"><span class="ico">◈</span>Fleet</button>
    </nav>
  </div>
  <div class="mg-toast" id="toast" role="status"></div>

  <script src="/phone-wave.js?v=1"></script>
  <script src="/phone-speak.js?v=4"></script>
  <script>
    (function () {
      var BASE = location.origin;
      var HOST = location.hostname;
      var secure = window.isSecureContext === true
        || location.protocol === "https:"
        || HOST === "localhost" || HOST === "127.0.0.1";
      var stillHttp = "http://" + HOST + ":9877";
      var httpsBase = "https://" + HOST + ":9878";
      /* Prefer same-origin for media when on 9877/9878 */
      var mediaBase = (location.port === "9877" || location.port === "9878")
        ? location.origin
        : stillHttp;

      var $ = function (id) { return document.getElementById(id); };
      var logEl = $("log"), statusEl = $("status"), orb = $("orb");
      var holdBtn = $("btn-hold"), toastEl = $("toast");
      var ambient = $("ambient-live");
      var rec = null, running = false, toastT = 0;
      var pendingPhoto = null; /* { blob, name, url } */
      var wallpaperOn = true;
      try {
        var w = localStorage.getItem("mg.phone.wallpaper");
        if (w === "0") wallpaperOn = false;
      } catch (e) {}

      $("ph-host").textContent =
        "MG phone · " + HOST + (secure ? ":9878" : ":9877") + (secure ? " · secure" : " · need https");
      /* Header Talk mirrors Hold chip */
      var holdHdr = $("btn-hold-hdr");
      function syncHoldUi(on) {
        if (holdBtn) {
          holdBtn.classList.toggle("on", !!on);
          holdBtn.textContent = on ? "Live" : "Hold";
        }
        if (holdHdr) {
          holdHdr.classList.toggle("on", !!on);
          holdHdr.textContent = on ? "Live" : "Talk";
        }
      }

      function toast(m) {
        toastEl.textContent = m;
        toastEl.classList.add("show");
        clearTimeout(toastT);
        toastT = setTimeout(function () { toastEl.classList.remove("show"); }, 2000);
      }
      function setStatus(html) { statusEl.innerHTML = html; }
      function errText(e) {
        if (!e) return "unknown";
        if (typeof e === "string") return e;
        return e.message || e.error || String(e);
      }
      function esc(s) {
        return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/"/g, "&quot;");
      }
      function absMedia(path) {
        if (!path) return "";
        if (/^https?:\/\//i.test(path)) return path;
        if (path.charAt(0) !== "/") path = "/" + path;
        return mediaBase + path;
      }
      function looksLikeUrl(s) {
        s = (s || "").trim();
        if (!s) return null;
        if (/^https?:\/\/\S+/i.test(s)) return s.match(/^https?:\/\/\S+/i)[0];
        if (/^(www\.)\S+/i.test(s)) return "https://" + s.match(/^\S+/)[0];
        return null;
      }

      /* No top HTTPS banner — stamp / status only */
      if (!secure) {
        if (holdBtn) holdBtn.disabled = true;
        setStatus("<em>need HTTPS</em> · open :9878");
      }

      function render(messages) {
        if (!messages || !messages.length) {
          logEl.innerHTML = '<div class="empty">Snaps · chat under the window · hold to talk · share photo</div>';
          return;
        }
        /* newest first (top) · oldest last (bottom) */
        var list = messages.slice().reverse();
        logEl.innerHTML = list.map(function (m) {
          var you = m.role !== "assistant";
          var t = esc(m.text || "");
          var ts = m.ts ? m.ts.slice(11, 19) : "";
          var kind = m.kind || (m.image ? "photo" : "text");
          var isSnap = kind === "photo" || kind === "snapshot" || !!m.image;
          var cls = (you ? "you" : "lab") + (isSnap ? " snap" : "");
          var tag = kind !== "text" ? '<span class="kind-tag">' + esc(kind) + "</span>" : "";
          var media = "";
          if (m.image) {
            var src = absMedia(m.image);
            media += '<a class="media" href="' + esc(src) + '" target="_blank" rel="noopener">' +
              '<img src="' + esc(src) + '" alt="" loading="lazy"/></a>';
          }
          var link = m.link || looksLikeUrl(m.text);
          if (link && kind !== "photo") {
            media += '<a class="link-chip" href="' + esc(link) + '" target="_blank" rel="noopener">' +
              esc(link.length > 48 ? link.slice(0, 45) + "…" : link) + "</a>";
          }
          /* hide redundant caption when thumb present */
          if (m.image && /^phone snap$/i.test((m.text || "").trim())) t = "";
          return '<div class="line ' + cls + '"><span class="who">' +
            (you ? "you" : "mini") + (ts ? " " + ts : "") + "</span>" + tag +
            (t ? " " + t : "") + media + "</div>";
        }).join("");
        logEl.scrollTop = 0;
      }

      function tickLive() {
        var t = Date.now();
        var url = stillHttp + "/live.jpg?t=" + t;
        $("peek").src = url;
        if (wallpaperOn && ambient) {
          ambient.src = url;
          ambient.classList.add("is-on");
          ambient.classList.remove("is-off");
        }
      }

      function setWallpaper(on) {
        wallpaperOn = !!on;
        try { localStorage.setItem("mg.phone.wallpaper", wallpaperOn ? "1" : "0"); } catch (e) {}
        $("btn-wallpaper").classList.toggle("on", wallpaperOn);
        if (!wallpaperOn && ambient) {
          ambient.classList.remove("is-on");
          ambient.classList.add("is-off");
        } else {
          tickLive();
        }
      }
      setWallpaper(wallpaperOn);

      function poll() {
        fetch(stillHttp + "/conversation?t=" + Date.now(), { cache: "no-store" })
          .then(function (r) { return r.json(); })
          .then(function (j) {
            if (j && j.messages) {
              render(j.messages);
              /* Loud phone TTS for new assistant lines (m4a or Web Speech) */
              try {
                if (window.__mgPhoneSpeak) {
                  window.__mgPhoneSpeak.setBase(stillHttp);
                  window.__mgPhoneSpeak.onMessages(j.messages);
                }
              } catch (eSp) {}
            }
            if (!running) setStatus("<em>idle</em> · glass · n=" + (j.n || 0) + " · speaker " +
              (window.__mgPhoneSpeak && window.__mgPhoneSpeak.speakOn() ? "on" : "off"));
          })
          .catch(function (e) { setStatus("poll · " + errText(e)); });
        tickLive();
        fetch(stillHttp + "/health", { cache: "no-store" })
          .then(function (r) { return r.json(); })
          .then(function (h) {
            var age = h.live_age_s;
            $("peek-lab").textContent = h.live
              ? "still-pipe · live " + (age != null ? age.toFixed(1) + "s" : "ok")
              : "still-pipe · waiting · aurora on";
          })
          .catch(function () {});
      }

      /* Fleet: phone registers on Mini hub so laptop upstairs can see peer */
      function fleetBeat() {
        try {
          if (window.__mgPhoneSpeak) {
            window.__mgPhoneSpeak.setBase(stillHttp);
            window.__mgPhoneSpeak.fleetRegister({ role: "phone", name: "Phone stream" });
          }
        } catch (e) {}
      }

      function postText(text) {
        text = (text || "").trim();
        if (!text && !pendingPhoto) return;
        var link = looksLikeUrl(text);

        if (pendingPhoto) {
          setStatus("<em>you</em> → photo…");
          var fd = new FormData();
          fd.append("file", pendingPhoto.blob, pendingPhoto.name || "share.jpg");
          if (text) fd.append("text", text);
          if (link) fd.append("link", link);
          fetch(stillHttp + "/share", { method: "POST", body: fd })
            .then(function (r) { return r.json(); })
            .then(function () {
              clearShare();
              $("input").value = "";
              setStatus("<em>sent</em> · photo");
              poll();
              toast("Photo sent");
            })
            .catch(function (e) { setStatus("share · " + errText(e)); });
          return;
        }

        if (link && text === link) {
          setStatus("<em>you</em> → link…");
          fetch(stillHttp + "/share", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text: text, link: link, src: "phone-chat" })
          }).then(function () {
            $("input").value = "";
            setStatus("<em>sent</em> · link");
            poll();
            toast("Link sent");
          }).catch(function (e) { setStatus("share · " + errText(e)); });
          return;
        }

        setStatus("<em>you</em> → mini…");
        fetch(stillHttp + "/transcript", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text: text, src: "phone-chat" })
        }).then(function () {
          $("input").value = "";
          setStatus("<em>sent</em> · waiting Mini…");
          poll();
          toast("Sent");
        }).catch(function (e) { setStatus("send · " + errText(e)); });
      }

      function clearShare() {
        if (pendingPhoto && pendingPhoto.url) {
          try { URL.revokeObjectURL(pendingPhoto.url); } catch (e) {}
        }
        pendingPhoto = null;
        $("share-preview").classList.remove("show");
        $("share-thumb").removeAttribute("src");
        $("file-photo").value = "";
        $("file-camera").value = "";
      }
      function setPendingPhoto(file) {
        if (!file) return;
        if (pendingPhoto && pendingPhoto.url) {
          try { URL.revokeObjectURL(pendingPhoto.url); } catch (e) {}
        }
        var url = URL.createObjectURL(file);
        pendingPhoto = { blob: file, name: file.name || "share.jpg", url: url };
        $("share-thumb").src = url;
        $("share-meta").textContent = (file.name || "photo") + " · " + Math.round(file.size / 1024) + " KB";
        $("share-preview").classList.add("show");
        toast("Photo ready · Go");
      }

      function startTalk() {
        if (!secure) { toast("Open HTTPS :9878"); return; }
        stopTalk();
        running = true;
        syncHoldUi(true);
        orb.classList.add("live");
        $("face-mode").textContent = "talk live";
        setStatus("<em>listening</em>");
        var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) { setStatus("no speech API"); return; }
        rec = new SR();
        rec.continuous = true;
        rec.interimResults = true;
        rec.lang = "en-US";
        rec.onresult = function (ev) {
          for (var i = ev.resultIndex; i < ev.results.length; i++) {
            var tr = (ev.results[i][0].transcript || "");
            var conf = ev.results[i][0].confidence;
            /* organic voice energy for orb (interim length + conf) */
            var energy = Math.min(1, (tr.length / 28) * 0.55 + (isFinite(conf) ? conf * 0.45 : 0.35));
            try { orb.style.setProperty("--mg-voice", energy.toFixed(3)); } catch (eV) {}
            if (ev.results[i].isFinal) {
              postText(tr);
              try { orb.style.setProperty("--mg-voice", "0.2"); } catch (eV2) {}
            } else {
              setStatus("… " + tr.slice(0, 36));
            }
          }
        };
        rec.onerror = function (e) { setStatus("speech · " + (e.error || errText(e))); };
        rec.onend = function () { if (running) try { rec.start(); } catch (_) {} };
        try { rec.start(); toast("Talk on"); } catch (e) { setStatus(errText(e)); }
      }
      function stopTalk() {
        running = false;
        syncHoldUi(false);
        orb.classList.remove("live");
        $("face-mode").textContent = "glass orb";
        try { if (rec) rec.stop(); } catch (_) {}
        rec = null;
        try { orb.style.setProperty("--mg-voice", "0"); } catch (eV3) {}
      }

      function toggleHold() {
        if (running) { stopTalk(); setStatus("<em>idle</em>"); toast("Talk off"); }
        else startTalk();
      }
      if (holdBtn) holdBtn.onclick = toggleHold;
      if (holdHdr) holdHdr.onclick = toggleHold;
      $("send").onclick = function () { postText($("input").value); };
      $("input").addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          $("send").click();
        }
      });
      $("btn-photo").onclick = function () { $("file-photo").click(); };
      $("btn-camera").onclick = function () { $("file-camera").click(); };
      $("file-photo").onchange = function () {
        if (this.files && this.files[0]) setPendingPhoto(this.files[0]);
      };
      $("file-camera").onchange = function () {
        if (this.files && this.files[0]) setPendingPhoto(this.files[0]);
      };
      $("share-clear").onclick = clearShare;
      $("btn-link").onclick = function () {
        var u = window.prompt("Paste a link to share with Mini", $("input").value || "https://");
        if (!u) return;
        u = u.trim();
        if (!looksLikeUrl(u) && !/^https?:\/\//i.test(u)) u = "https://" + u;
        $("input").value = u;
        postText(u);
      };
      $("btn-wallpaper").onclick = function () {
        setWallpaper(!wallpaperOn);
        toast(wallpaperOn ? "Live wallpaper on" : "Aurora only");
      };

      function go(path, preferHttps) {
        var https = preferHttps !== false;
        var port = https ? "9878" : "9877";
        var proto = https ? "https:" : "http:";
        location.href = proto + "//" + HOST + ":" + port + path;
      }
      $("btn-cam").onclick = function () { go("/phone.html", true); };
      if ($("btn-cam-quick")) $("btn-cam-quick").onclick = function () { go("/phone.html", true); };
      if ($("btn-fleet-hdr")) {
        $("btn-fleet-hdr").onclick = function () { go("/fleet.html", true); };
      }
      $("btn-refresh").onclick = function () {
        try { if (window.__mgPhoneSpeak) window.__mgPhoneSpeak.unlock(); } catch (e) {}
        poll();
        toast("↻");
      };
      /* Tap Hold also unlocks loud speaker for iOS */
      if (holdBtn) {
        holdBtn.addEventListener("pointerdown", function () {
          try { if (window.__mgPhoneSpeak) window.__mgPhoneSpeak.unlock(); } catch (e) {}
        }, { passive: true });
      }
      $("nav-cam").onclick = function () { go("/phone.html", true); };
      $("nav-talk").onclick = function () { go("/phone-talk.html", true); };
      if ($("nav-fleet")) $("nav-fleet").onclick = function () { go("/fleet.html", true); };

      /* Drag/drop or paste image */
      document.addEventListener("paste", function (e) {
        var items = e.clipboardData && e.clipboardData.items;
        if (!items) return;
        for (var i = 0; i < items.length; i++) {
          if (items[i].type && items[i].type.indexOf("image") === 0) {
            var f = items[i].getAsFile();
            if (f) { setPendingPhoto(f); e.preventDefault(); break; }
          }
        }
      });

      poll();
      setInterval(poll, 900);
      fleetBeat();
      setInterval(fleetBeat, 25000);
      setStatus(secure ? "<em>ready</em> · glass · share photo/link" : "<em>open HTTPS</em> for mic");
    })();
  </script>
  <script src="/phone-pwa.js" defer></script>
</body>
</html>
