# Deploy Grok Build Lab (docs/architecture-lab) to GitHub Pages
# https://fornevercollective.github.io/grok-build/
# Product name: Grok Build Lab · path remains docs/architecture-lab (historical)
name: pages-grok-build-lab

on:
  push:
    branches: [main, master]
    paths:
      - "docs/architecture-lab/**"
      - ".github/workflows/pages-architecture-lab.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-grok-build-lab
  cancel-in-progress: true

jobs:
  status-gating:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: status.x.ai go/no-go (pre-deploy)
        # Big deploys: block on known incidents; allow unknown if CF blocks runners
        run: |
          chmod +x docs/architecture-lab/scripts/status-xai-check.sh
          bash docs/architecture-lab/scripts/status-xai-check.sh --strict \
            || STATUS_XAI_ALLOW_UNKNOWN=1 bash docs/architecture-lab/scripts/status-xai-check.sh

  build:
    needs: status-gating
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash docs/architecture-lab/scripts/prepare-pages-site.sh /tmp/grok-build-lab-site

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/grok-build-lab-site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
